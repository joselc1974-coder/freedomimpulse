<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="fabicon.png">
<title>FreedomImpulse — Diagnóstico Operativo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Nunito:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --azul: #0F172A;
  --azul-mid: #1E293B;
  --naranja: #EA580C;
  --naranja-light: #FB923C;
  --gris-fondo: #F8FAFC;
  --gris-borde: #E2E8F0;
  --blanco: #FFFFFF;
  --texto-suave: #64748B;
  --texto-medio: #334155;
  --max: 680px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { font-family: 'Nunito', sans-serif; background: var(--blanco); color: var(--azul); line-height: 1.65; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }

/* NOISE */
.noise { position: relative; }
.noise::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
.noise > * { position: relative; z-index: 1; }

/* SCROLL REVEAL */
.reveal { opacity: 0; transform: translateY(26px); transition: opacity 0.7s cubic-bezier(.4,0,.2,1), transform 0.7s cubic-bezier(.4,0,.2,1); }
.reveal.visible { opacity: 1; transform: none; }
.d1 { transition-delay: 0.1s; }
.d2 { transition-delay: 0.2s; }
.d3 { transition-delay: 0.32s; }

/* TOPBAR */
.topbar {
  background: var(--naranja);
  color: var(--blanco);
  text-align: center;
  padding: 10px 16px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  line-height: 1.5;
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 200;
  padding: 15px 20px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(15,23,42,0.97);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.logo { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1rem; letter-spacing: -0.04em; color: var(--blanco); }
.logo span { color: var(--naranja); }
.nav-cta {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--naranja); color: var(--blanco);
  font-family: 'Outfit', sans-serif; font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 9px 16px; border-radius: 4px;
  transition: background 0.2s, transform 0.15s;
}
.nav-cta:active { transform: scale(0.96); }

/* HERO */
.hero {
  background: var(--azul);
  padding: 60px 24px 56px;
  min-height: 88svh;
  display: flex; align-items: center;
  overflow: hidden;
}
.hero-glow-1 {
  position: absolute; border-radius: 50%; pointer-events: none;
  width: 480px; height: 480px;
  background: radial-gradient(circle, rgba(234,88,12,0.16) 0%, transparent 65%);
  top: -100px; right: -140px;
}
.hero-glow-2 {
  position: absolute; border-radius: 50%; pointer-events: none;
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(234,88,12,0.08) 0%, transparent 65%);
  bottom: -40px; left: -60px;
}
.hero-inner { max-width: var(--max); margin: 0 auto; width: 100%; }
.hero-rule { display: block; width: 32px; height: 3px; background: var(--naranja); margin-bottom: 24px; border-radius: 2px; }
.hero h1 {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(2.3rem, 9vw, 4rem);
  font-weight: 900; line-height: 1.06;
  color: var(--blanco); letter-spacing: -0.04em;
  margin-bottom: 22px;
}
.hero h1 .n { color: var(--naranja); }
.hero-sub {
  font-size: 1rem; color: rgba(248,250,252,0.62);
  line-height: 1.75; font-weight: 300; max-width: 520px; margin-bottom: 36px;
}
.hero-sub strong { color: rgba(248,250,252,0.88); font-weight: 500; }
.hero-btn {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--naranja); color: var(--blanco);
  font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 700;
  letter-spacing: 0.03em; padding: 16px 26px; border-radius: 6px;
  box-shadow: 0 4px 28px rgba(234,88,12,0.38);
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
}
.hero-btn:active { transform: scale(0.97); }
.hero-btn svg { width: 17px; height: 17px; stroke: white; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.scroll-hint {
  display: flex; align-items: center; gap: 8px;
  margin-top: 44px; font-size: 0.68rem;
  color: rgba(248,250,252,0.25); letter-spacing: 0.08em; text-transform: uppercase;
}
.scroll-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
}
.scroll-dot::after {
  content: ''; width: 4px; height: 4px;
  background: var(--naranja); border-radius: 50%;
  animation: blink 2.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.65)} }

/* VIDEO */
.video-s { background: var(--azul-mid); padding: 0 24px 52px; }
.video-inner { max-width: var(--max); margin: 0 auto; padding-top: 36px; }
.video-box {
  aspect-ratio: 16/9; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; overflow: hidden; position: relative;
  transition: background 0.3s, border-color 0.3s;
}
.video-box::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(234,88,12,0.07) 0%, transparent 70%);
}
.video-box:active { background: rgba(255,255,255,0.07); }
.play-btn {
  width: 64px; height: 64px; border-radius: 50%; background: var(--naranja);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px; position: relative; z-index: 1;
  animation: pulse-ring 2.8s infinite;
  box-shadow: 0 0 0 0 rgba(234,88,12,0.45);
}
@keyframes pulse-ring {
  0%{box-shadow:0 0 0 0 rgba(234,88,12,0.5)} 70%{box-shadow:0 0 0 20px rgba(234,88,12,0)} 100%{box-shadow:0 0 0 0 rgba(234,88,12,0)}
}
.play-btn svg { width: 24px; height: 24px; fill: white; margin-left: 4px; }
.video-cap { color: rgba(248,250,252,0.38); font-size: 0.8rem; font-style: italic; font-weight: 300; position: relative; z-index: 1; }

/* OFERTA */
.oferta { background: var(--gris-fondo); padding: 60px 24px; border-top: 3px solid var(--naranja); }
.oferta-in { max-width: var(--max); margin: 0 auto; }
.oferta h2 {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(1.6rem, 6.5vw, 2.4rem);
  font-weight: 800; letter-spacing: -0.03em; line-height: 1.15;
  margin-bottom: 22px; color: var(--azul);
}
.oferta-body { font-size: 1rem; color: var(--texto-medio); line-height: 1.82; font-weight: 400; }
.oferta-body p { margin-bottom: 15px; }
.oferta-body p:last-child { margin-bottom: 0; }
.oferta-body strong { color: var(--azul); font-weight: 600; }
.alerta {
  margin: 28px 0; padding: 18px 18px 18px 22px;
  background: var(--azul); border-left: 3px solid var(--naranja); border-radius: 0 6px 6px 0;
}
.alerta p { font-size: 0.92rem; color: rgba(248,250,252,0.72); line-height: 1.65; font-weight: 300; }
.alerta strong { color: var(--naranja-light); font-weight: 600; }

/* BTN */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--naranja); color: var(--blanco);
  font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 700;
  letter-spacing: 0.04em; padding: 16px 24px; border-radius: 6px;
  box-shadow: 0 4px 20px rgba(234,88,12,0.28);
  transition: background 0.2s, transform 0.15s;
  cursor: pointer; border: none; width: 100%;
}
.btn:active { transform: scale(0.97); }
.btn-wrap { margin-top: 28px; }

/* MÉTRICAS */
.metricas { background: var(--azul); padding: 44px 24px; }
.metricas-g { max-width: var(--max); margin: 0 auto; display: grid; grid-template-columns: repeat(3,1fr); }
.m { text-align: center; padding: 16px 8px; border-right: 1px solid rgba(255,255,255,0.06); }
.m:last-child { border-right: none; }
.m-n { font-family: 'Outfit', sans-serif; font-size: clamp(1.7rem,7vw,2.8rem); font-weight: 900; color: var(--naranja); letter-spacing: -0.05em; line-height: 1; margin-bottom: 5px; }
.m-l { font-size: 0.68rem; color: rgba(248,250,252,0.38); font-weight: 400; line-height: 1.4; }

/* SECCIÓN */
.s { padding: 60px 24px; }
.s.dark { background: var(--azul); }
.s.mid { background: var(--azul-mid); }
.s.alt { background: var(--gris-fondo); }
.s.white { background: var(--blanco); }
.s-in { max-width: var(--max); margin: 0 auto; }
.s h2 {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(1.65rem, 6vw, 2.3rem);
  font-weight: 800; letter-spacing: -0.035em; line-height: 1.12;
  margin-bottom: 22px; color: var(--azul);
}
.s.dark h2, .s.mid h2 { color: var(--blanco); }
.txt { font-size: 0.97rem; color: var(--texto-medio); line-height: 1.82; font-weight: 400; }
.txt p { margin-bottom: 16px; }
.txt p:last-child { margin-bottom: 0; }
.txt strong { color: var(--azul); font-weight: 600; }
.s.dark .txt, .s.mid .txt { color: rgba(248,250,252,0.62); }
.s.dark .txt strong, .s.mid .txt strong { color: rgba(248,250,252,0.92); }

/* CITA */
.cita {
  margin: 24px 0; padding: 20px 18px 20px 22px;
  background: rgba(255,255,255,0.04);
  border-left: 3px solid var(--naranja); border-radius: 0 8px 8px 0;
}
.cita em { font-style: italic; color: rgba(248,250,252,0.78); font-size: 1.02rem; line-height: 1.7; font-weight: 300; }

/* FRASE GRANDE */
.big-q {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(1.35rem, 5.5vw, 1.9rem);
  font-weight: 800; color: var(--blanco);
  line-height: 1.2; margin: 32px 0 24px; letter-spacing: -0.03em;
}
.big-q span { color: var(--naranja); }

/* DOS COLUMNAS */
.two { display: grid; grid-template-columns: 1fr; gap: 14px; margin: 24px 0; }
@media (min-width: 540px) { .two { grid-template-columns: 1fr 1fr; } }

.card {
  padding: 20px 18px; border-radius: 8px;
  border: 1px solid var(--gris-borde); background: var(--blanco);
}
.card.si { border-top: 3px solid var(--naranja); }
.card.no { border-top: 3px solid var(--gris-borde); background: #F1F5F9; }
.card-tag {
  font-family: 'Outfit', sans-serif; font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; color: var(--texto-suave);
}
.card.si .card-tag { color: var(--naranja); }
.card ul { list-style: none; }
.card li {
  display: flex; align-items: flex-start; gap: 9px; padding: 7px 0;
  border-bottom: 1px solid var(--gris-borde);
  font-size: 0.86rem; color: var(--texto-medio); line-height: 1.5; font-weight: 400;
}
.card li:last-child { border-bottom: none; padding-bottom: 0; }
.card li::before { content: '✕'; color: #94A3B8; flex-shrink: 0; font-size: 0.72rem; margin-top: 2px; }
.card.si li::before { content: '✓'; color: var(--naranja); font-weight: 700; }

/* ESCALERA */
.ladder { margin-top: 24px; border-radius: 8px; overflow: hidden; border: 1px solid var(--gris-borde); }
.step { display: flex; border-bottom: 1px solid var(--gris-borde); }
.step:last-child { border-bottom: none; }
.step-n {
  background: var(--azul); min-width: 76px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 18px 8px; text-align: center;
}
.step-n .sn-label { font-family: 'Outfit', sans-serif; font-size: 0.56rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(248,250,252,0.3); margin-bottom: 3px; }
.step-n .sn-price { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 900; color: var(--naranja); letter-spacing: -0.04em; line-height: 1; }
.step-n .sn-free { font-family: 'Outfit', sans-serif; font-size: 0.62rem; font-weight: 700; color: var(--naranja-light); text-transform: uppercase; }
.step-n .sn-sub { font-size: 0.56rem; color: rgba(248,250,252,0.78); margin-top: 3px; line-height: 1.4; }
.step-b { padding: 18px 18px; background: var(--blanco); }
.step-b h4 { font-family: 'Outfit', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--texto-suave); margin-bottom: 3px; }
.step-b .st { font-family: 'Outfit', sans-serif; font-size: 0.92rem; font-weight: 700; color: var(--azul); margin-bottom: 7px; letter-spacing: -0.02em; }
.step-b p { font-size: 0.85rem; color: var(--texto-medio); line-height: 1.62; font-weight: 400; }

/* RESULTADOS */
.results { margin: 24px 0; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07); }
.result { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.result:last-child { border-bottom: none; }
.rn { font-family: 'Outfit', sans-serif; font-weight: 900; color: var(--naranja); font-size: 0.92rem; flex-shrink: 0; min-width: 42px; letter-spacing: -0.02em; }
.result p { font-size: 0.88rem; color: rgba(248,250,252,0.6); line-height: 1.55; font-weight: 300; }

/* FIRMA */
.firma { margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.07); font-size: 0.88rem; color: rgba(248,250,252,0.38); font-style: italic; font-weight: 300; line-height: 1.65; }

/* CHART */
.chart-box {
  margin: 24px 0; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 20px 16px 14px;
}
.chart-title { font-size: 0.65rem; color: rgba(248,250,252,0.3); font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 18px; }
#bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; margin-bottom: 10px; }
.chart-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 9px; border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 0.68rem; color: rgba(248,250,252,0.28);
}
#chart-counter { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.15rem; color: var(--naranja); letter-spacing: -0.04em; }

/* OPCIONES */
.ops { display: grid; grid-template-columns: 1fr; gap: 14px; margin: 30px 0 28px; }
@media (min-width: 540px) { .ops { grid-template-columns: 1fr 1fr; } }
.op { padding: 22px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.07); }
.op.no { background: rgba(255,255,255,0.02); }
.op.si { background: rgba(234,88,12,0.08); border-color: rgba(234,88,12,0.22); }
.op-tag { font-family: 'Outfit', sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 9px; }
.op.no .op-tag { color: rgba(248,250,252,0.22); }
.op.si .op-tag { color: var(--naranja-light); }
.op h3 { font-family: 'Outfit', sans-serif; font-size: 0.97rem; font-weight: 800; color: var(--blanco); margin-bottom: 9px; letter-spacing: -0.02em; }
.op p { font-size: 0.85rem; color: rgba(248,250,252,0.48); line-height: 1.6; font-weight: 300; }

/* CTA FINAL */
.cta-s { background: var(--azul); padding: 68px 24px; position: relative; overflow: hidden; }
.cta-g { position: absolute; pointer-events: none; border-radius: 50%; background: radial-gradient(circle, rgba(234,88,12,0.11) 0%, transparent 65%); width: 380px; height: 380px; bottom: -90px; right: -90px; }
.cta-in { max-width: var(--max); margin: 0 auto; position: relative; }
.cta-s h2 { font-family: 'Outfit', sans-serif; font-size: clamp(1.7rem,7vw,2.7rem); font-weight: 900; color: var(--blanco); letter-spacing: -0.04em; line-height: 1.1; }
.cta-note { text-align: center; margin-top: 12px; font-size: 0.75rem; color: rgba(248,250,252,0.28); font-style: italic; }

/* STICKY */
.sticky { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,23,42,0.98); border-top: 1px solid rgba(255,255,255,0.08); padding: 12px 20px calc(12px + env(safe-area-inset-bottom)); z-index: 300; transition: opacity 0.3s; backdrop-filter: blur(12px); }
.sticky .btn { border-radius: 6px; font-size: 0.85rem; padding: 14px 20px; }
@media (max-width: 768px) { .sticky { display: block; } }

/* FOOTER */
<footer>
  <div class="f-logo">Freedom<span>Impulse</span></div>
  <div style="display:flex;justify-content:center;gap:20px;margin-bottom:10px;">
    <a href="fi-privacidad.html" target="_blank" rel="noopener" style="font-size:.72rem;color:rgba(248,250,252,.28);font-weight:400;transition:color .2s;" onmouseover="this.style.color='rgba(248,250,252,.6)'" onmouseout="this.style.color='rgba(248,250,252,.28)'">Política de Privacidad</a>
    <a href="fi-cookies.html" target="_blank" rel="noopener" style="font-size:.72rem;color:rgba(248,250,252,.28);font-weight:400;transition:color .2s;" onmouseover="this.style.color='rgba(248,250,252,.6)'" onmouseout="this.style.color='rgba(248,250,252,.28)'">Política de Cookies</a>
  </div>
  <p>© 2025 FreedomImpulse. Todos los derechos reservados.</p>
</footer>

<!-- STICKY MOBILE -->
<div class="sticky" id="sticky-bar">
  <a href="#agendar" class="btn">Agendar Diagnóstico Gratuito →</a>
</div>

<script>
/* SCROLL REVEAL */
const ro = new IntersectionObserver(e => e.forEach(x => {
  if(x.isIntersecting) { x.target.classList.add('visible'); }
  else { x.target.classList.remove('visible'); }
}), {threshold:0.1});
document.querySelectorAll('.reveal').forEach(el => ro.observe(el));

/* STICKY — ocultar sobre hero */
const sb = document.getElementById('sticky-bar');
const heroEl = document.querySelector('.hero');
sb.style.opacity = '0'; sb.style.pointerEvents = 'none';
new IntersectionObserver(e => {
  const show = !e[0].isIntersecting;
  sb.style.opacity = show ? '1' : '0';
  sb.style.pointerEvents = show ? 'auto' : 'none';
},{threshold:0.05}).observe(heroEl);

/* CHART */
(function(){
  const months=['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12'];
  const vals=[200,210,230,270,320,380,450,510,560,610,660,700];
  const max=700, el=document.getElementById('bar-chart'), ctr=document.getElementById('chart-counter');
  months.forEach((m,i)=>{
    const w=document.createElement('div');
    w.style.cssText='flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px;height:100%;';
    const b=document.createElement('div');
    b.style.cssText=`width:100%;background:${i===11?'var(--naranja)':'rgba(234,88,12,0.28)'};height:0;transition:height 0.7s ${i*0.07}s cubic-bezier(.4,0,.2,1);border-radius:2px 2px 0 0;`;
    b.dataset.h=Math.round((vals[i]/max)*100);
    const lb=document.createElement('span');
    lb.style.cssText='font-size:0.48rem;color:rgba(248,250,252,0.18);white-space:nowrap;';
    lb.textContent=m; w.appendChild(b); w.appendChild(lb); el.appendChild(w);
  });
  let done=false;
  new IntersectionObserver(e=>{
    if(e[0].isIntersecting){
      if(done) return; done=true;
      el.querySelectorAll('[data-h]').forEach(b=>{ b.style.height=b.dataset.h+'%'; });
      let c=200; const t=setInterval(()=>{ c=Math.min(c+8,700); ctr.textContent=c.toLocaleString('es-ES'); if(c>=700)clearInterval(t); },16);
    } else {
      done=false;
      el.querySelectorAll('[data-h]').forEach(b=>{ b.style.height='0%'; });
      ctr.textContent='200';
    }
  },{threshold:0.35}).observe(document.getElementById('chart-container'));
})();
</script>

<script>
/* ── MODAL ── */
let currentStep = 1;
const totalSteps = 9;
const answers = {};

function openModal() {
  currentStep = 1;
  document.getElementById('modal-overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
  showStep(1);
}
function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

// Cerrar modal SOLO con la X — no al hacer click fuera

// Detectar confirmación de reserva de Builderall y extraer datos
window.addEventListener('message', function(e) {
  if (!e.data) return;
  try {
    const data = typeof e.data === 'object' ? e.data : JSON.parse(e.data);
    const str = JSON.stringify(data).toLowerCase();
    
    if (['booking_confirmed','appointment_confirmed','confirmed','success','scheduled','booked'].some(k => str.includes(k))) {
      if (data.email || data.userEmail || data.customer_email) {
        localStorage.setItem('lead_email', data.email || data.userEmail || data.customer_email);
      }
      if (data.name || data.userName || data.customer_name) {
        localStorage.setItem('lead_name', data.name || data.userName || data.customer_name);
      }
      
      redirigirPostBooking();
    }
  } catch(err) {
    const str = String(e.data).toLowerCase();
    if (str.includes('confirm') || str.includes('success') || str.includes('booked') || str.includes('scheduled')) {
      redirigirPostBooking();
    }
  }
});

let iframeLastHeight = 0;
let bookingConfirmTimer = null;
function watchIframeForConfirmation() {
  const iframe = document.getElementById('booking-iframe');
  if (!iframe) return;
  bookingConfirmTimer = setInterval(() => {
    try {
      const h = iframe.contentWindow?.document?.body?.scrollHeight;
      if (h && h !== iframeLastHeight) {
        iframeLastHeight = h;
        if (h < 500 && iframeLastHeight > 600) {
          redirigirPostBooking();
        }
      }
    } catch(e) { }
  }, 1000);
}

function redirigirPostBooking() {
  if (bookingConfirmTimer) clearInterval(bookingConfirmTimer);
  setTimeout(() => { window.location.href = 'fi-post-booking.html'; }, 1200);
}

function showStep(n) {
  document.querySelectorAll('.modal-step').forEach(s => s.style.display = 'none');
  const isFinal = n > totalSteps;
  if (isFinal) {
    document.getElementById('step-final').style.display = 'block';
    document.getElementById('modal-nav').style.display = 'none';
    document.getElementById('modal-box').style.maxWidth = '780px';
    setTimeout(watchIframeForConfirmation, 2000);
  } else {
    document.getElementById('step-' + n).style.display = 'block';
    document.getElementById('modal-nav').style.display = 'flex';
    document.getElementById('modal-box').style.maxWidth = '560px';
    document.getElementById('btn-back').style.display = n > 1 ? 'block' : 'none';
    document.getElementById('btn-next').textContent = n === totalSteps ? 'Agendar →' : 'Continuar →';
  }
  document.getElementById('modal-step-label').textContent = isFinal ? 'Listo' : `Paso ${n} de ${totalSteps}`;
  document.getElementById('modal-progress').style.width = (Math.min(n, totalSteps) / totalSteps * 100) + '%';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal-box').scrollIntoView({behavior:'smooth', block:'start'});
}

function modalNext() {
  const err = document.getElementById('modal-error');
  err.style.display = 'none';

  if (currentStep === 1) {
    const sel = document.querySelector('input[name=q1]:checked');
    if (!sel) { err.style.display='block'; return; }
    answers.rol = sel.value === '__otro__' ? (document.getElementById('q1-other').value || 'Otro') : sel.value;
  }
  if (currentStep === 2) {
    const sel = document.querySelector('input[name=q2]:checked');
    if (!sel) { err.style.display='block'; return; }
    answers.empleados = sel.value;
  }
  if (currentStep === 3) {
    const sel = document.querySelector('input[name=q3]:checked');
    if (!sel) { err.style.display='block'; return; }
    answers.sector = sel.value === '__otro__' ? (document.getElementById('q3-other').value || 'Otro') : sel.value;
  }
  if (currentStep === 4) {
    const sels = [...document.querySelectorAll('input[name=q4]:checked')];
    if (!sels.length) { err.style.display='block'; return; }
    const vals = sels.map(s => s.value === '__otro__' ? (document.getElementById('q4-other').value || 'Otro') : s.value);
    answers.situacion = vals.join(', ');
  }
  if (currentStep === 5) {
    answers.urgencia = document.getElementById('q5-range').value;
  }
  if (currentStep === 6) {
    const sels = [...document.querySelectorAll('input[name=q6]:checked')];
    answers.inversiones = sels.length ? sels.map(s=>s.value).join(', ') : 'Ninguna';
  }
  if (currentStep === 7) {
    const v = document.getElementById('q7-input').value.trim();
    if (!v) { err.textContent='Por favor escribe el nombre de tu empresa.'; err.style.display='block'; return; }
    answers.empresa = v;
  }
  if (currentStep === 8) {
    const v = document.getElementById('q8-input').value.trim();
    if (!v) { err.textContent='Por favor escribe tu ciudad y país.'; err.style.display='block'; return; }
    answers.ciudad = v;
  }
  if (currentStep === 9) {
    const nombre = document.getElementById('lead-nombre').value.trim();
    const email  = document.getElementById('lead-email').value.trim();
    const prefix = document.getElementById('lead-prefix').value;
    const phone  = document.getElementById('lead-phone').value.trim();

    // Validar Nombre
    if (!nombre) {
      err.textContent = 'Por favor, introduce tu nombre.';
      err.style.display = 'block';
      return;
    }
    // Validar Formato de Email
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      err.textContent = 'Introduce un correo electrónico válido.';
      err.style.display = 'block';
      return;
    }
    // Validar Prefijo
    if (!prefix) {
      err.textContent = 'Selecciona el prefijo de tu país.';
      err.style.display = 'block';
      return;
    }
    // Validar Teléfono (Solo números/espacios/guiones, longitud razonable)
    const cleanPhone = phone.replace(/[\s-]/g, '');
    if (!phone || !/^\d{6,15}$/.test(cleanPhone)) {
      err.textContent = 'Introduce un número de WhatsApp / Teléfono válido (mínimo 6 dígitos sin el prefijo).';
      err.style.display = 'block';
      return;
    }

    answers.email  = email;
    answers.nombre = nombre;
    answers.phone  = phone;
    answers.prefix = prefix;

    document.getElementById('lead-sending').style.display = 'block';
    document.getElementById('btn-next').disabled = true;
    document.getElementById('btn-next').style.opacity = '0.6';

    const MB_TOKEN = '630092:a33022b3bd884a02e40b33139f1547b0';
    const MB_LIST_UID = '69558d540a00b';

    const mbPayload = new URLSearchParams({
      email:       email,
      list_uid:    MB_LIST_UID,
      taginternals:'diagnostico-gratuito',
      fname:       nombre,
      PHONE:       phone,
      PHONEPREFIX: prefix
    });

    fetch(`https://member.mailingboss.com/integration/index.php/lists/subscribers/create/${MB_TOKEN}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: mbPayload.toString()
    })
    .then(r => r.json())
    .then(res => {
      console.log('✅ MailingBoss:', res);
    })
    .catch(e => {
      console.warn('⚠️ MailingBoss error (no bloquea el flujo):', e);
    })
    .finally(() => {
      document.getElementById('lead-sending').style.display = 'none';
      document.getElementById('btn-next').disabled = false;
      document.getElementById('btn-next').style.opacity = '1';
      currentStep++;
      showStep(currentStep);
      sendToWorker();
    });
    return;
  }

  currentStep++;
  showStep(currentStep);

  if (currentStep > totalSteps) {
    sendToWorker();
  }
}

function sendToWorker() {
    fetch('https://freedom-api.joselc1974.workers.dev/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        empresa:     answers.empresa     || '',
        rol:         answers.rol         || '',
        empleados:   answers.empleados   || '',
        sector:      answers.sector      || '',
        situacion:   answers.situacion   || '',
        urgencia:    parseInt(answers.urgencia) || 0,
        inversiones: answers.inversiones || '',
        ciudad:      answers.ciudad      || '',
        email:       answers.email       || '',
        nombre:      answers.nombre      || '',
        phone:       answers.phone       || '',
        prefix:      answers.prefix      || ''
      })
    })
    .then(() => console.log('✅ Datos enviados al Worker'))
    .catch(e => console.error('❌ Error al enviar al Worker:', e));

    try {
      const entry = { ...answers, fecha: new Date().toISOString(), id: Date.now() };
      const stored = JSON.parse(localStorage.getItem('fi_responses') || '[]');
      stored.push(entry);
      localStorage.setItem('fi_responses', JSON.stringify(stored));
    } catch(e) {}
}

function modalBack() {
  if (currentStep > 1) { currentStep--; showStep(currentStep); }
}

document.getElementById('q5-range').addEventListener('input', function() {
  document.getElementById('q5-val').textContent = this.value;
});

document.querySelectorAll('.radio-group').forEach(g => {
  g.querySelectorAll('input[type=radio]').forEach(inp => {
    inp.addEventListener('change', function() {
      g.querySelectorAll('.opt-row').forEach(r => r.classList.remove('selected'));
      this.closest('.opt-row').classList.add('selected');
      const q = g.dataset.q;
      const otherInput = document.getElementById('q'+q+'-other');
      if (otherInput) {
        if (this.value === '__otro__') { otherInput.style.display='block'; otherInput.focus(); }
        else { otherInput.style.display='none'; }
      }
    });
  });
});

document.querySelectorAll('.check-group').forEach(g => {
  g.querySelectorAll('input[type=checkbox]').forEach(inp => {
    inp.addEventListener('change', function() {
      const maxSel = g.dataset.max ? parseInt(g.dataset.max) : 99;
      const checked = [...g.querySelectorAll('input[type=checkbox]:checked')];
      if (checked.length > maxSel) { this.checked = false; return; }
      this.closest('.opt-row').classList.toggle('selected', this.checked);
      const q = g.dataset.q;
      const otherInput = document.getElementById('q'+q+'-other');
      if (otherInput && this.value === '__otro__') {
        if (this.checked) { otherInput.style.display='block'; otherInput.focus(); }
        else { otherInput.style.display='none'; }
      }
    });
  });
});

document.querySelectorAll('.btn, .hero-btn, .nav-cta').forEach(btn => {
  if (btn.href === '#' || btn.getAttribute('href') === '#' || btn.getAttribute('href') === '#agendar') {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      openModal();
    });
  }
});
</script>
